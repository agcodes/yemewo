version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yemewo-app
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro

  dev:
    image: node:20-alpine
    container_name: yemewo-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    profiles:
      - dev
